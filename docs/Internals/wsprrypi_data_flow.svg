<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1350" height="750" viewBox="0 0 1350 750">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff7a00"/>
    </marker>
    <style>
      .oval { fill: #ffffff; stroke: #ff7a00; stroke-width: 4; }
      .link { stroke: #ff7a00; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #000000; }
      .sub   { font-family: "Courier New", Courier, monospace; font-size: 20px; font-weight: 400; fill: #000000; }
      .sub2  { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 400; fill: #000000; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1350" height="750" fill="#ffffff"/>

  <!-- Nodes -->
  <!-- Executable (left) -->
  <ellipse class="oval" cx="270" cy="275" rx="230" ry="120"/>
  <text x="270" y="260" text-anchor="middle" class="title">Wsprry Pi Executable</text>
  <text x="270" y="295" text-anchor="middle" class="sub">/usr/local/bin/wsprrypi</text>

  <!-- Service config (top-right) -->
  <ellipse class="oval" cx="930" cy="110" rx="310" ry="90"/>
  <text x="930" y="100" text-anchor="middle" class="title">Wsprry Pi Service Configuration</text>
  <text x="930" y="135" text-anchor="middle" class="sub">/lib/systemd/system/wsprrypi.service</text>

  <!-- Web UI (mid-right) -->
  <ellipse class="oval" cx="990" cy="335" rx="330" ry="95"/>
  <text x="990" y="325" text-anchor="middle" class="title">Wsprry Pi Web UI</text>
  <text x="990" y="360" text-anchor="middle" class="sub">http://{servername}.local/wsprrypi/</text>

  <!-- Logs (bottom-left) -->
  <ellipse class="oval" cx="350" cy="625" rx="260" ry="95"/>
  <text x="350" y="615" text-anchor="middle" class="title">Wsprry Pi Logs</text>
  <text x="350" y="650" text-anchor="middle" class="sub2">(systemd-journald)</text>

  <!-- Configuration (bottom-mid/right) -->
  <ellipse class="oval" cx="820" cy="625" rx="300" ry="95"/>
  <text x="820" y="615" text-anchor="middle" class="title">Wsprry Pi Configuration</text>
  <text x="820" y="650" text-anchor="middle" class="sub">/usr/local/etc/wsprrypi.ini</text>

  <!-- Links -->
  <!-- Service config -> Executable -->
  <path class="link" d="M 700 165 C 610 210, 475 240, 405 255"/>

  <!-- Web UI -> Executable -->
  <path class="link" d="M 660 335 C 560 325, 465 305, 405 285"/>

  <!-- Config -> Executable -->
  <path class="link" d="M 560 585 C 490 545, 435 455, 380 350"/>

  <!-- Executable -> Logs -->
  <path class="link" d="M 235 380 C 215 450, 255 535, 305 580"/>
</svg>
